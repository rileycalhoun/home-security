<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home Face Recognition</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span id="camDot" class="cam-dot" aria-hidden="true"></span>
        <span class="brand-name">Home Face Recognition</span>
      </div>
      <nav class="nav" aria-label="Main">
        <a href="#/cameras" data-view="cameras">Cameras</a>
        <a href="#/people" data-view="people">People</a>
        <a href="#/events" data-view="events">Events</a>
        <a href="#/settings" data-view="settings">Settings</a>
      </nav>
    </aside>

    <main class="content">
      <section id="view-cameras" class="view">
        <div class="view-header">
          <h1>Cameras</h1>
          <span id="knownBadge" class="badge">&hellip;</span>
        </div>
        <div class="card">
          <div class="stage">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="overlay"></canvas>
            <div id="stageMessage" class="stage-message">Starting camera&hellip;</div>
          </div>
          <section class="controls">
            <div id="status" class="status info">
              <span class="dot" aria-hidden="true"></span>
              <span id="statusText">Starting camera&hellip;</span>
            </div>
            <div id="enrollPanel" class="enroll-panel">
              <div id="qualityFeedback" class="quality info">Position your face in view.</div>
              <div class="name-row active">
                <input id="nameInput" list="peopleNames" autocomplete="off" maxlength="64"
                       placeholder="Who is this? (pick a name to add another angle)">
                <datalist id="peopleNames"></datalist>
                <button id="saveName" class="btn primary">Enroll</button>
                <button id="cancelName" class="btn ghost">Cancel</button>
              </div>
            </div>
            <button id="enrollFace" class="btn primary" disabled>Enroll this face</button>
          </section>
        </div>
      </section>

      <section id="view-people" class="view" hidden>
        <div class="view-header">
          <h1>People</h1>
          <span id="peopleStatus" class="page-status" role="status"></span>
        </div>
        <div id="peopleList" class="people-list"></div>
      </section>

      <section id="view-events" class="view" hidden>
        <div class="view-header">
          <h1>Events</h1>
        </div>
        <div class="card empty-state">
          <p>No events yet.</p>
          <p class="muted">The event log &mdash; who was seen, where, and when &mdash; arrives in v0.6.</p>
        </div>
      </section>

      <section id="view-settings" class="view" hidden>
        <div class="view-header">
          <h1>Settings</h1>
        </div>
        <form id="settingsForm" class="card settings-form">
          <div id="settingsFields" class="settings-fields"></div>
          <div class="settings-actions">
            <button type="submit" class="btn primary">Save</button>
            <button type="button" id="settingsReset" class="btn ghost">Reset to defaults</button>
            <span id="settingsStatus" class="page-status" role="status"></span>
          </div>
        </form>
      </section>
    </main>
  </div>
  <canvas id="capture" hidden></canvas>
  <script src="/static/app.js"></script>
</body>
</html>
